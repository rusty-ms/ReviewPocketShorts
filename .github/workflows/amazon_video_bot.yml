name: Amazon Video Bot

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 14:00 UTC (08:00 America/Chicago)
    - cron: "0 14 * * *"

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # ====== Amazon PA API (required for real products + images) ======
      AMAZON_ACCESS_KEY:  ${{ secrets.AMAZON_ACCESS_KEY }}
      AMAZON_SECRET_KEY:  ${{ secrets.AMAZON_SECRET_KEY }}
      AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
      AMAZON_HOST:        webservices.amazon.com
      AMAZON_REGION:      us-east-1

      # ====== OpenAI (required for script + TTS) ======
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL:   gpt-4o-mini
      TTS_VOICE:      nova

      # ====== GitHub (for website auto-publish) ======
      GITHUB_TOKEN: ${{ secrets.GH_PUBLISH_TOKEN }}

      # ====== Product categories to rotate ======
      AMAZON_CATEGORIES: "Electronics,Beauty,Kitchen,Toys,Sports,Home"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow openai python-dotenv

      - name: Show environment
        run: |
          echo "Commit: $GITHUB_SHA"
          python -V
          ffmpeg -version | head -1
          ls -la scripts/

      - name: Run video generator
        run: |
          python generate_video_from_api.py

      - name: Show output
        if: always()
        run: |
          echo "=== Output files ==="
          ls -lh output/ 2>/dev/null || echo "No output directory"
          echo ""
          echo "=== Metadata ==="
          cat output/metadata.txt 2>/dev/null || echo "No metadata file"

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-video-${{ github.run_number }}
          path: |
            output/video.mp4
            output/voice.mp3
            output/metadata.txt
            output/product.json
          if-no-files-found: warn
          retention-days: 7
